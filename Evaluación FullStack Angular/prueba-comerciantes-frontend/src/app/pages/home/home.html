<app-header></app-header>

<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold">Lista Comerciantes</h3>

    <div>
      <button class="btn btn-primary me-2" (click)="crear()">Crear Comerciante</button>

      <button class="btn btn-danger" *ngIf="role == 'Administrador'" (click)="descargarCSV()">
        Descargar CSV
      </button>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <table class="table table-hover table-bordered align-middle">
        <thead class="table-primary">
          <tr>
            <th>Razón Social</th>
            <th>Teléfono</th>
            <th>Correo</th>
            <th>Fecha Registro</th>
            <th>Establecimientos</th>
            <th>Estado</th>
            <th class="text-center">Acciones</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let c of comerciantes">
            <td class="fw-semibold">
              {{ c.nombreRazonSocial }}
            </td>

            <td>
              {{ c.telefono || '-' }}
            </td>

            <td>
              {{ c.correoElectronico || '-' }}
            </td>

            <td>
              {{ c.fechaRegistro | date: 'yyyy-MM-dd' }}
            </td>

            <td>
              {{ c.cantidadEstablecimientos || 0 }}
            </td>

            <td>
              <span
                class="badge"
                [ngClass]="{
                  'bg-success': c.estado == 'Activo',
                  'bg-danger': c.estado == 'Inactivo',
                }"
              >
                {{ c.estado }}
              </span>
            </td>

            <td class="text-center">
              <button class="btn btn-sm btn-outline-primary me-1" (click)="editar(c.id)">✏</button>

              <button class="btn btn-sm btn-outline-warning me-1" (click)="cambiarEstado(c.id)">
                🔄
              </button>

              <button
                class="btn btn-sm btn-outline-danger"
                *ngIf="role == 'Administrador'"
                (click)="eliminar(c.id)"
              >
                🗑
              </button>
            </td>
          </tr>
        </tbody>
      </table>

      <div class="mt-3">
        <select class="form-select w-auto" [(ngModel)]="pageSize" (change)="cargarComerciantes()">
          <option value="5">5</option>
          <option value="10">10</option>
          <option value="15">15</option>
        </select>
      </div>
    </div>
  </div>
</div>
