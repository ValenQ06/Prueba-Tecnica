<app-header></app-header>

<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold">Lista Comerciantes</h3>

    <div>
      <button class="btn btn-primary me-2" (click)="crear()">Crear Comerciante</button>

      <button class="btn btn-danger" *ngIf="role == 'Administrador'" (click)="descargarCSV()">
        Descargar CSV
      </button>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <table class="table table-hover table-bordered align-middle">
        <thead class="table-primary">
          <tr>
            <th>Razón Social</th>
            <th>Teléfono</th>
            <th>Correo</th>
            <th>Fecha Registro</th>
            <th>Establecimientos</th>
            <th>Estado</th>
            <th class="text-center">Acciones</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let c of comerciantes">
            <td class="fw-semibold">
              {{ c.nombreRazonSocial }}
            </td>

            <td>
              {{ c.telefono || '-' }}
            </td>

            <td>
              {{ c.correoElectronico || '-' }}
            </td>

            <td>
              {{ c.fechaRegistro | date: 'yyyy-MM-dd' }}
            </td>

            <td>
              {{ c.cantidadEstablecimientos || 0 }}
            </td>

            <td>
              <span
                class="badge"
                [ngClass]="{
                  'bg-success': c.estado == 'Activo',
                  'bg-danger': c.estado == 'Inactivo',
                }"
              >
                {{ c.estado }}
              </span>
            </td>

            <td class="text-center">
              <div class="d-flex justify-content-center gap-2">
                <!-- Editar -->
                <button class="btn btn-icon btn-edit" (click)="editar(c.id)" title="Editar">
                  <i class="bi bi-pencil-fill"></i>
                </button>

                <!-- Estado -->
                <button
                  class="btn btn-icon btn-estado"
                  (click)="cambiarEstado(c.id)"
                  title="Cambiar estado"
                >
                  <i class="bi bi-arrow-repeat"></i>
                </button>

                <!-- Eliminar -->
                <button
                  class="btn btn-icon btn-delete"
                  *ngIf="role == 'Administrador'"
                  (click)="eliminar(c.id)"
                  title="Eliminar"
                >
                  <i class="bi bi-trash-fill"></i>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>

      <div class="d-flex justify-content-between align-items-center mt-3">
        <!-- Selector cantidad -->
        <div>
          <select [(ngModel)]="pageSize" (change)="cargarComerciantes()" class="form-select w-auto">
            <option [value]="5">5</option>
            <option [value]="10">10</option>
            <option [value]="15">15</option>
          </select>
        </div>

        <!-- Paginador -->
        <nav>
          <ul class="pagination mb-0">
            <!-- Anterior -->
            <li class="page-item" [class.disabled]="page === 1">
              <button class="page-link" (click)="cambiarPagina(page - 1)">«</button>
            </li>

            <!-- Números -->
            <li
              class="page-item"
              *ngFor="let p of [].constructor(totalPages); let i = index"
              [class.active]="page === i + 1"
            >
              <button class="page-link" (click)="cambiarPagina(i + 1)">
                {{ i + 1 }}
              </button>
            </li>

            <!-- Siguiente -->
            <li class="page-item" [class.disabled]="page === totalPages">
              <button class="page-link" (click)="cambiarPagina(page + 1)">»</button>
            </li>
          </ul>
        </nav>
      </div>
    </div>
  </div>
</div>
